services:
  mysql:
    image: mysql:8.0
    container_name: pollhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pollhub
      MYSQL_USER: pollhub_user
      MYSQL_PASSWORD: pollhub_pass
    ports:
      - "3306:3306"
    volumes:
      - pollhub-data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: pollhub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: pollhub
      DB_USER: pollhub_user
      DB_PASSWORD: pollhub_pass
    ports:
      - "8080:8080"

volumes:
  pollhub-data:
