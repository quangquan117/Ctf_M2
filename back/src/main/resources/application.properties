spring.application.name=demo
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:pollhub}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:pollhub_user}
spring.datasource.password=${DB_PASSWORD:pollhub_pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
app.jwt.secret=01234567890123456789012345678901
app.jwt.expiration-ms=86400000
